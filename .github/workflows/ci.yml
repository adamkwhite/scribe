name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev headers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Clippy TUI feature
        run: cargo clippy -p scribe-tui --all-targets --features tui

      - name: Build
        run: cargo build --workspace --verbose

      - name: Build core embedded whisper feature
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p scribe-core --verbose --features embedded-whisper

      - name: Build core auto-download feature
        run: cargo build -p scribe-core --verbose --features auto-download-whisper-model

      - name: Build TUI feature
        run: cargo build -p scribe-tui --features tui --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Test core TUI support feature
        run: cargo test -p scribe-core --features tui --verbose

      - name: Test TUI feature
        run: cargo test -p scribe-tui --features tui --verbose
