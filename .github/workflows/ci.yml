name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux native build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev clang libclang-dev cmake

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Clippy TUI feature
        run: cargo clippy -p scribe-tui --all-targets --features tui

      - name: Build
        run: cargo build --workspace --verbose

      - name: Build TUI feature
        run: cargo build -p scribe-tui --features tui --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Test TUI feature
        run: cargo test -p scribe-tui --features tui --verbose

      - name: Upload Windows debug binaries
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: scribe-windows-debug
          path: |
            target/debug/scribe.exe
            target/debug/scribe-cli.exe
            target/debug/scribe-tui.exe
          if-no-files-found: error
          retention-days: 14
