sonar.projectKey=adamkwhite_scribe
sonar.organization=adamkwhite

sonar.projectName=scribe

sonar.sources=crates
sonar.exclusions=**/target/**,**/tests/**

sonar.tests=crates
sonar.test.inclusions=**/tests/**,**/*_test.rs

sonar.sourceEncoding=UTF-8

# Rust-specific report imports
sonar.rust.lcov.reportPaths=lcov.info
sonar.rust.clippy.reportPaths=clippy-report.json

# Suppress text:S8570 ("Cargo.lock missing") on per-crate Cargo.tomls.
# This rule doesn't understand Cargo workspaces — a workspace has a single
# Cargo.lock at the root, not one per crate. The root has Cargo.lock next
# to it; the per-crate manifests share that lockfile by design.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=text:S8570
sonar.issue.ignore.multicriteria.e1.resourceKey=crates/*/Cargo.toml
